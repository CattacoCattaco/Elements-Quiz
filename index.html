<!DOCTYPE html>
<html>

<head>

  <title>Elements Quiz</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <form>
    <br/>

  </form>
  <script src="script.js"></script>
</body>

</html>
